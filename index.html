<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ローカル将棋</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main id="app" class="app">
    <header class="app-header">
      <h1>ローカル将棋</h1>
      <p class="note">ローカル対局・棋譜保存・拡張ルール・軽量通信対戦</p>
    </header>

    <section class="toolbar" aria-label="ゲーム設定と保存">
      <label class="field-label" for="ruleset-select">
        ルールセット
        <select id="ruleset-select" class="ruleset-select"></select>
      </label>

      <div class="toolbar-group" aria-label="局面操作">
        <button id="undo-button" class="action-button" type="button">1手戻す</button>
        <button id="reset-button" class="action-button" type="button">初期化</button>
        <button id="resign-button" class="action-button" type="button">投了</button>
      </div>

      <div class="toolbar-group" aria-label="保存と読み込み">
        <button id="save-local-button" class="action-button" type="button">ローカル保存</button>
        <button id="load-local-button" class="action-button" type="button">ローカル読込</button>
        <button id="export-button" class="action-button" type="button">JSON書出</button>
        <button id="import-button" class="action-button" type="button">JSON読込</button>
        <input id="import-input" class="hidden-file" type="file" accept="application/json,.json">
      </div>
    </section>

    <section class="online-panel" aria-label="軽量通信対戦">
      <div class="online-header">
        <h2>軽量通信対戦</h2>
        <div class="online-badges">
          <span>状態: <strong id="online-status">未接続</strong></span>
          <span>自分: <strong id="online-role">未設定</strong></span>
        </div>
      </div>

      <ol class="online-steps">
        <li>ホスト側は「ホスト開始」を押し、出力されたオファーコードを相手へ渡す。</li>
        <li>ゲスト側はオファーコードを入力欄へ貼り、「ゲスト回答作成」を押して、回答コードをホストへ返す。</li>
        <li>ホスト側は回答コードを入力欄へ貼り、「ホストで回答読込」を押す。</li>
      </ol>

      <div class="online-controls">
        <button id="host-offer-button" class="action-button" type="button">ホスト開始（先手）</button>
        <button id="guest-answer-button" class="action-button" type="button">ゲスト回答作成（後手）</button>
        <button id="host-accept-answer-button" class="action-button" type="button">ホストで回答読込</button>
        <button id="copy-signal-button" class="action-button" type="button">出力コードをコピー</button>
        <button id="sync-button" class="action-button" type="button">局面再送</button>
        <button id="disconnect-button" class="action-button" type="button">通信終了</button>
      </div>

      <div class="signal-grid">
        <label class="signal-label" for="signal-input">
          入力コード
          <textarea id="signal-input" class="signal-textarea" spellcheck="false" placeholder="相手から受け取ったオファー/回答コードを貼り付け"></textarea>
        </label>

        <label class="signal-label" for="signal-output">
          出力コード
          <textarea id="signal-output" class="signal-textarea" spellcheck="false" readonly placeholder="ここに作成された接続コードが表示されます"></textarea>
        </label>
      </div>
    </section>

    <p id="message" class="message" aria-live="polite"></p>

    <div class="layout">
      <section class="game-panel" aria-label="将棋盤">
        <div id="white-hand" class="hand" aria-label="後手の持ち駒"></div>

        <div class="status-row">
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>

        <div id="board" class="board" aria-label="盤面"></div>

        <div id="black-hand" class="hand" aria-label="先手の持ち駒"></div>
      </section>

      <aside class="record-panel" aria-label="棋譜ログ">
        <h2>棋譜ログ</h2>
        <div class="replay-controls" aria-label="棋譜再生">
          <button id="replay-start-button" class="action-button" type="button">開始</button>
          <button id="replay-prev-button" class="action-button" type="button">前へ</button>
          <button id="replay-next-button" class="action-button" type="button">次へ</button>
          <button id="replay-end-button" class="action-button" type="button">最新</button>
        </div>
        <ol id="history-list" class="history-list"></ol>
      </aside>
    </div>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
